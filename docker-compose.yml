version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pwr-studia-backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      - NODE_ENV=production
      - DATABASE_CLIENT=${DATABASE_CLIENT:-sqlite}
      - DATABASE_FILENAME=${DATABASE_FILENAME:-.tmp/data.db}
    volumes:
      - ./backend/.tmp:/app/.tmp
      - ./backend/public/uploads:/app/public/uploads
    ports:
      - "127.0.0.1:13388:1337"
    networks:
      - pwr-studia-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        PUBLIC_STRAPI_URL: http://cms.praktycznymarketing.edu.pl
        STRAPI_URL: http://backend:1337
    container_name: pwr-studia-frontend
    restart: unless-stopped
    environment:
      - PUBLIC_STRAPI_URL=http://cms.praktycznymarketing.edu.pl
      - STRAPI_URL=http://backend:1337
      - NODE_OPTIONS=--dns-result-order=ipv4first
      - HOST=0.0.0.0
    volumes:
      - ./frontend-dist:/app/dist
    depends_on:
      - backend
    # We use a custom entrypoint to ensure runtime sync
    command: [ "sh", "./entrypoint.sh" ]
    networks:
      - pwr-studia-network

networks:
  pwr-studia-network:
    driver: bridge
